services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: absalom-command-center-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: absalom-command-center-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - api

  postgres:
    image: postgres:16
    container_name: absalom-command-center-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - absalom_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: absalom-command-center-redis
    ports:
      - "6379:6379"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: absalom-command-center-worker
    command: celery -A services.worker.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: absalom-command-center-beat
    command: celery -A services.worker.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_started

volumes:
  absalom_postgres_data:
